name: Java Interview Knowledge Review

on:
  # 工作日早8点推送 (UTC 0:00 = 北京时间 8:00)
  schedule:
    - cron: '0 0 * * 1-5'  # 周一到周五 早8点
    - cron: '0 13 * * 1-5' # 周一到周五 晚9点 (UTC 13:00 = 北京时间 21:00)
    - cron: '0 */4 * * 6,0' # 周末每4小时推送一次
  workflow_dispatch:  # 手动触发

jobs:
  send-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Send daily review
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          python scripts/send_review.py
