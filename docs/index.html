<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>知识库</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="个人知识库 - 技术、读书、收藏">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Theme - 使用国内可访问的 CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-plugin-carbon@1/index.css">
  
  <!-- Custom styles - MUST load after theme CSS to override -->
  <style>
    :root {
      --theme-color: #42b983;
      --theme-color-dark: #2d8c5c;
      --sidebar-width: 260px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; }
    .sidebar-nav > ul > li > p { font-weight: 600; margin-top: 1rem; }

    /* ========== 文章排版核心样式 ========== */
    /* 覆盖 Docsify vue.css 默认样式 */

    /* 正文内容区：在保持宽屏利用率的同时，略微增加四周留白，阅读更舒展 */
    .markdown-section {
      max-width: none !important;
      margin: 0 !important;
      padding: 32px 40px !important;
      box-sizing: border-box !important;
    }

    /* h1 - 文章大标题，绿色粗底线 */
    .markdown-section h1 {
      color: var(--theme-color) !important;
      font-size: 2rem !important;
      font-weight: 700 !important;
      margin: 0.5rem 0 1.5rem !important;
      padding-bottom: 0.5rem !important;
      border-bottom: 3px solid var(--theme-color) !important;
      letter-spacing: 0.5px;
    }

    /* h2 - 章节标题，深色细底线 */
    .markdown-section h2 {
      font-size: 1.5rem !important;
      font-weight: 600 !important;
      color: #2c3e50 !important;
      margin: 2rem 0 1rem !important;
      padding-bottom: 0.4rem !important;
      border-bottom: 1px solid #ddd !important;
    }

    /* h3 - 小节标题，无底线 */
    .markdown-section h3 {
      font-size: 1.25rem !important;
      font-weight: 600 !important;
      color: #34495e !important;
      margin: 1.5rem 0 0.8rem !important;
      border-bottom: none !important;
    }

    /* h4 */
    .markdown-section h4 {
      font-size: 1.1rem !important;
      font-weight: 600 !important;
      color: #555 !important;
      margin: 1.2rem 0 0.6rem !important;
    }

    /* 段落 */
    .markdown-section p {
      margin: 0.8rem 0 !important;
      line-height: 1.8 !important;
    }

    /* 加粗 - 关键修复！Docsify 默认 font-weight: 400 */
    .markdown-section strong {
      font-weight: 700 !important;
      color: #2c3e50 !important;
    }

    /* 斜体 */
    .markdown-section em {
      font-style: italic !important;
      color: #555 !important;
    }

    /* 列表 - 关键修复！Docsify 默认 list-style: none */
    .markdown-section ul {
      list-style: disc !important;
      padding-left: 1.5rem !important;
      margin: 0.8rem 0 !important;
    }
    .markdown-section ol {
      list-style: decimal !important;
      padding-left: 1.5rem !important;
      margin: 0.8rem 0 !important;
    }
    .markdown-section li {
      margin: 0.4rem 0 !important;
      line-height: 1.7 !important;
    }
    .markdown-section li > ul,
    .markdown-section li > ol {
      margin: 0.2rem 0 !important;
    }

    /* 链接 */
    .markdown-section a {
      color: var(--theme-color) !important;
      text-decoration: none !important;
      border-bottom: 1px solid transparent !important;
      transition: border-color 0.2s;
    }
    .markdown-section a:hover {
      border-bottom-color: var(--theme-color) !important;
    }

    /* 引用块 */
    .markdown-section blockquote {
      margin: 1rem 0 !important;
      padding: 0.8rem 1.2rem !important;
      border-left: 4px solid var(--theme-color) !important;
      background: #f0faf5 !important;
      color: #555 !important;
    }
    .markdown-section blockquote p {
      margin: 0.3rem 0 !important;
    }

    /* 行内代码 */
    .markdown-section code {
      background: #fff3e0 !important;
      padding: 2px 6px !important;
      border-radius: 3px !important;
      font-size: 0.9em !important;
      color: #e65100 !important;
    }

    /* 代码块 */
    .markdown-section pre {
      background: #1e1e1e !important;
      border-radius: 6px !important;
      padding: 1rem 1.2rem !important;
      margin: 1.2rem 0 !important;
      overflow-x: auto !important;
      border: 1px solid #333 !important;
    }
    .markdown-section pre code {
      background: none !important;
      padding: 0 !important;
      color: #d4d4d4 !important;
      font-size: 0.9em !important;
    }

    /* 表格 */
    .markdown-section table {
      border-collapse: collapse !important;
      width: 100% !important;
      margin: 1rem 0 !important;
      display: table !important;
    }
    .markdown-section th {
      background: #f5f5f5 !important;
      font-weight: 600 !important;
      border: 1px solid #ddd !important;
      padding: 0.6rem 1rem !important;
      text-align: left !important;
    }
    .markdown-section td {
      border: 1px solid #ddd !important;
      padding: 0.6rem 1rem !important;
    }
    .markdown-section tr:nth-child(even) {
      background: #fafafa !important;
    }

    /* 分隔线 */
    .markdown-section hr {
      border: none !important;
      border-top: 1px solid #eee !important;
      margin: 2rem 0 !important;
    }

    /* 图片 */
    .markdown-section img {
      max-width: 100% !important;
      border-radius: 4px !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    /* 来源标签 */
    .source-tag { display: inline-block; font-size: 0.75rem; color: #999; margin-top: 1rem; }

    /* 侧边栏美化 */
    .sidebar { padding-top: 0; }
    .app-name-link { font-weight: 700; }

    /* 手机适配 */
    @media (max-width: 768px) {
      .markdown-section { padding: 20px 18px !important; }
      .markdown-section h1 { font-size: 1.5rem !important; }
      .markdown-section h2 { font-size: 1.3rem !important; }
      .markdown-section h3 { font-size: 1.15rem !important; }
      .markdown-section pre { font-size: 0.85rem !important; }
      .markdown-section table { font-size: 0.9rem !important; }
      .markdown-section th, .markdown-section td { padding: 0.4rem 0.6rem !important; }
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: '📚 知识库',
      nameLink: '/',
      loadSidebar: 'sidebar.md',
      relativePath: true,
      autoHeader: true,
      auto2top: true,
      subMaxLevel: 3,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索',
        noData: '没有结果',
        depth: 6
      },
      pagination: {
        previousText: '上一章节',
        nextText: '下一章节',
        crossChapter: true,
        crossChapterText: true,
      },
      copyCode: {
        buttonText: '复制',
        errorText: '错误',
        successText: '已复制'
      },
      // 外部链接插件
      plugins: [
        function(hook) {
          // 让外部链接在新标签页打开
          hook.afterEach(function(html) {
            return html.replace(/<a href="(https?:\/\/[^"]+)"/g, '<a href="$1" target="_blank" rel="noopener"');
          });
        }
      ]
    }
  </script>
  
  <!-- Docsify - 显式 HTTPS -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  
  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  
  <!-- Syntax highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-go.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-docker.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
</body>
</html>
